
<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- styles injected -->
</head>
<body>
    <header>
        <h1>Gemini CoE | Use Case Exchange</h1>
        <nav>
            <a href="?page=home">Home</a>
            <a href="?page=gems">Gem Library</a>
            <a href="?page=use_cases">Use Cases</a>
        </nav>
    </header>

    <div class="container">
        <div style="text-align: right; margin-bottom: 1rem;">
            <button class="btn" onclick="openModal()">+ Submit Use Case</button>
        </div>

        <div class="grid">
            <!-- Dynamic Content -->
            <div class="card">
                <div style="display:flex; justify-content:space-between;">
                    <h3>Shift Handover Log</h3>
                    <span class="badge" style="background:#e6f4ea; color:#1e8e3e;">40h Saved</span>
                </div>
                <p><strong>Author:</strong> Ryan Fitzgerald (Training)</p>
                <p>"Generated 50 multiple-choice questions for a training test."</p>
                <div style="margin-top:10px;">
                    <span class="tag">Productivity ✅</span>
                    <span class="tag">Quality ✅</span>
                    <span class="tag">Innovation 🚀</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Placeholder -->
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
        <div class="card" style="margin: 10% auto; max-width: 500px;">
            <h2>Submit Your Flow</h2>
            <form>
                <label>Title</label><br>
                <input type="text" style="width:100%"><br><br>
                <label>The Prompt</label><br>
                <textarea style="width:100%"></textarea><br><br>
                <button class="btn">Submit</button>
                <button type="button" onclick="closeModal()" style="background:#ccc; border:none; padding:0.75rem 1.5rem; border-radius:8px;">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('modal').style.display = 'block'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
